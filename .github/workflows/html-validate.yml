name: HTML Validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  html-validate:
    name: HTML Structure Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # Prüft alle .html Dateien gegen die Regeln in .htmlvalidate.json
      - name: Validate HTML files
        run: npx html-validate "**/*.html" --ignore "node_modules/**" --config config/.htmlvalidate.json
